version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: workflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - workflow_postgres:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env.example
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app

  airflow:
    image: apache/airflow:2.10.2
    depends_on:
      - api
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: bash -c "airflow db migrate && airflow standalone"
    volumes:
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"

volumes:
  workflow_postgres:
